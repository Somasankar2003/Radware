---
- name: Configure Alteon Dynamic Real Servers and Server Group
  hosts: localhost
  gather_facts: false

  tasks:

    #################################################################
    # Parse Real Servers Input
    #################################################################

    - name: Parse Real Servers Input
      set_fact:

        parsed_real_servers: >-
          {{
            real_servers.split(',')
            | map('trim')
            | reject('equalto', '')
            | list
          }}

    #################################################################
    # Initialize Server Lists
    #################################################################

    - name: Initialize Server Lists
      set_fact:
        existing_server_names: []
        new_server_ip_list: []

    #################################################################
    # Separate Existing Servers and New IPs
    #################################################################

    - name: Separate Existing Servers and New IPs
      set_fact:

        existing_server_names: >-
          {{
            existing_server_names + [ item ]
            if item.startswith('rs')
            else existing_server_names
          }}

        new_server_ip_list: >-
          {{
            new_server_ip_list + [ item ]
            if not item.startswith('rs')
            else new_server_ip_list
          }}

      loop: "{{ parsed_real_servers }}"

    #################################################################
    # Debug Parsed Inputs
    #################################################################

    - name: Debug Parsed Inputs
      debug:
        msg:
          - "existing_server_names : {{ existing_server_names }}"
          - "new_server_ip_list    : {{ new_server_ip_list }}"
          - "group_mode            : {{ group_mode }}"

    #################################################################
    # Validate Input
    #################################################################

    - name: Validate Input
      assert:
        that:
          - parsed_real_servers | length > 0
        fail_msg: >
          You must provide at least one real server
          or IP address in real_servers

    #################################################################
    # Calculate Starting Index
    #################################################################

    - name: Calculate Starting Index
      set_fact:

        rs_start_index: >-
          {{
            (
              existing_server_names
              | map('regex_replace', '^rs', '')
              | map('int')
              | list
              | max
              if existing_server_names | length > 0
              else 0
            ) + 1
          }}

    #################################################################
    # Create New Real Servers
    #################################################################

    - name: Create New Real Servers

      radware.radware_modules.alteon_config_server:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443
          ssh_port: 22
          timeout: 5

        state: present

        parameters:
          index: "rs{{ rs_start_index | int + ansible_loop.index0 }}"
          state: enabled
          ip_address: "{{ item }}"
          weight: 7
          availability: 5

          server_ports:
            - 80
            - 8080
            - 8081

      loop: "{{ new_server_ip_list }}"

      loop_control:
        extended: true

      when:
        - new_server_ip_list | length > 0

    #################################################################
    # Build Newly Created Server Names
    #################################################################

    - name: Build New Server Names
      set_fact:

        new_server_names: >-
          {{
            range(
              rs_start_index | int,
              rs_start_index | int + new_server_ip_list | length
            )
            | map('string')
            | map('regex_replace', '^(.*)$', 'rs\1')
            | list
          }}

      when:
        - new_server_ip_list | length > 0

    #################################################################
    # Default Empty New Server List
    #################################################################

    - name: Default New Server Name List
      set_fact:
        new_server_names: []

      when:
        - new_server_ip_list | length == 0

    #################################################################
    # Merge Existing + New Servers
    #################################################################

    - name: Merge Existing and New Servers
      set_fact:

        final_server_names: >-
          {{
            (
              existing_server_names
              + new_server_names
            ) | unique | list
          }}

    #################################################################
    # Debug Final Server Names
    #################################################################

    - name: Debug Final Server Names
      debug:
        msg:
          - "final_server_names : {{ final_server_names }}"

    #################################################################
    # Fetch Existing Group Information
    #################################################################

    - name: Fetch Existing Group Information

      radware.radware_modules.alteon_config_server_group:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443
          ssh_port: 22
          timeout: 5

        state: gather_facts

        parameters:
          index: "{{ server_group_name }}"

      register: existing_group_info

      ignore_errors: true

      when:
        - group_mode | lower == 'existing'

    #################################################################
    # Merge Existing Group Members
    #################################################################

    - name: Merge Existing Group Members
      set_fact:

        final_server_names: >-
          {{
            (
              (
                existing_group_info.ansible_facts.server_names
                | default([])
              )
              + final_server_names
            ) | unique | list
          }}

      when:
        - group_mode | lower == 'existing'
        - existing_group_info is not failed

    #################################################################
    # Create Empty Server Group
    #################################################################

    - name: Create Empty Server Group

      radware.radware_modules.alteon_config_server_group:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443
          ssh_port: 22
          timeout: 5

        state: present

        parameters:
          index: "{{ server_group_name }}"
          slb_metric: "{{ slb_metric }}"
          persist_overload_max_conn_server: enabled

    #################################################################
    # Apply Empty Group
    #################################################################

    - name: Apply Empty Group

      radware.radware_modules.alteon_mng_config:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443

        command: apply

    #################################################################
    # Attach Servers To Group
    #################################################################

    - name: Attach Servers To Group

      radware.radware_modules.alteon_config_server_group:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443
          ssh_port: 22
          timeout: 5

        state: present

        parameters:
          index: "{{ server_group_name }}"
          slb_metric: "{{ slb_metric }}"
          persist_overload_max_conn_server: enabled
          server_names: "{{ final_server_names }}"

    #################################################################
    # Apply Configuration
    #################################################################

    - name: Apply Alteon Configuration

      radware.radware_modules.alteon_mng_config:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443

        command: apply

    #################################################################
    # Save Configuration
    #################################################################

    - name: Save Alteon Configuration

      radware.radware_modules.alteon_mng_config:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443

        command: save

    #################################################################
    # Final Result
    #################################################################

    - name: Final Result
      debug:
        msg:
          - "Group Mode           : {{ group_mode }}"
          - "Server Group         : {{ server_group_name }}"
          - "SLB Metric           : {{ slb_metric }}"
          - "Existing Servers     : {{ existing_server_names }}"
          - "New Server IPs       : {{ new_server_ip_list }}"
          - "Final Servers        : {{ final_server_names }}"
