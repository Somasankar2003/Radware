---
- name: Configure Alteon Dynamic Real Servers and Server Group
  hosts: localhost
  gather_facts: false
  vars:
    #################################################################
    # Convert Survey Inputs into Lists
    # new_server_ips     : comma-separated IPs  (leave blank if none)
    # existing_server_names : comma-separated rs-names (leave blank if none)
    # server_group_name  : target group (new or existing)
    # group_mode         : "new" | "existing"
    #################################################################
    new_server_ip_list: >-
      {{
        (new_server_ips | default('')) != ''
        | ternary(
            new_server_ips.split(',') | map('trim') | select() | list,
            []
          )
      }}

    existing_server_name_list: >-
      {{
        (existing_server_names | default('')) != ''
        | ternary(
            existing_server_names.split(',') | map('trim') | select() | list,
            []
          )
      }}

  tasks:
    #################################################################
    # Validate – at least one input must be provided
    #################################################################
    - name: Validate inputs
      assert:
        that:
          - (new_server_ip_list | length > 0) or (existing_server_name_list | length > 0)
        fail_msg: >
          You must supply at least one value in
          'new_server_ips' or 'existing_server_names'.

    #################################################################
    # Determine the starting index for new real-server naming
    # so rs-names never clash with existing ones.
    # We derive the highest numeric suffix already present in
    # existing_server_name_list, then count up from there.
    #################################################################
    - name: Calculate starting index for new servers
      set_fact:
        rs_start_index: >-
          {{
            (
              existing_server_name_list
              | map('regex_replace', '^rs', '')
              | select('match', '^\d+$')
              | map('int')
              | list
              | max
              if existing_server_name_list | length > 0
              else 0
            ) + 1
          }}

    #################################################################
    # Create NEW Real Servers (skipped if new_server_ip_list is empty)
    #################################################################
    - name: Create New Real Servers
      radware.radware_modules.alteon_config_server:
        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443
          ssh_port: 22
          timeout: 5
        state: present
        parameters:
          index: "rs{{ rs_start_index | int + ansible_loop.index0 }}"
          state: enabled
          ip_address: "{{ item }}"
          weight: 7
          availability: 5
          server_ports:
            - 80
            - 8080
            - 8081
      loop: "{{ new_server_ip_list }}"
      loop_control:
        extended: true
      when: new_server_ip_list | length > 0

    #################################################################
    # Build name list for newly created servers
    #################################################################
    - name: Build New Server Name List
      set_fact:
        new_server_names: >-
          {{
            range(
              rs_start_index | int,
              rs_start_index | int + new_server_ip_list | length
            )
            | map('string')
            | map('regex_replace', '^(.*)$', 'rs\1')
            | list
          }}
      when: new_server_ip_list | length > 0

    - name: Default New Server Name List to empty
      set_fact:
        new_server_names: []
      when: new_server_ip_list | length == 0

    #################################################################
    # Merge: existing server names  +  newly created server names
    #################################################################
    - name: Build Final Combined Server List
      set_fact:
        final_server_names: "{{ existing_server_name_list + new_server_names }}"

    #################################################################
    # Fetch current group members when attaching to EXISTING group
    # so we append instead of overwrite
    #################################################################
    - name: Fetch Existing Group Configuration
      radware.radware_modules.alteon_config_server_group:
        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443
          ssh_port: 22
          timeout: 5
        state: gather_facts
        parameters:
          index: "{{ server_group_name }}"
      register: existing_group_info
      ignore_errors: true          # group may not exist yet
      when: group_mode == 'existing'

    #################################################################
    # Merge current group members with our final list (dedup)
    #################################################################
    - name: Merge Existing Group Members into Final List
      set_fact:
        final_server_names: >-
          {{
            (
              (existing_group_info.msg.server_names | default([]))
              + final_server_names
            ) | unique | list
          }}
      when:
        - group_mode == 'existing'
        - existing_group_info is not failed

    #################################################################
    # Create / Update the Server Group
    #################################################################
    - name: Create or Update Server Group
      radware.radware_modules.alteon_config_server_group:
        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443
          ssh_port: 22
          timeout: 5
        state: present
        parameters:
          index: "{{ server_group_name }}"
          slb_metric: "{{ slb_metric }}"
          persist_overload_max_conn_server: enabled
          server_names: "{{ final_server_names }}"

    #################################################################
    # Apply & Save
    #################################################################
    - name: Apply Alteon Configuration
      radware.radware_modules.alteon_mng_config:
        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443
        command: apply

    - name: Save Alteon Configuration
      radware.radware_modules.alteon_mng_config:
        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443
        command: save

    #################################################################
    # Final Output
    #################################################################
    - name: Display Final Result
      debug:
        msg:
          - "Group Mode             : {{ group_mode }}"
          - "Server Group           : {{ server_group_name }}"
          - "SLB Metric             : {{ slb_metric }}"
          - "Existing Servers Added : {{ existing_server_name_list }}"
          - "New Servers Created    : {{ new_server_names }}"
          - "Final Group Members    : {{ final_server_names }}"
