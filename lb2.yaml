---
- name: Configure Alteon Dynamic Real Servers and Server Group
  hosts: localhost
  gather_facts: false

  tasks:

    #################################################################
    # Parse Existing Server Names
    #################################################################

    - name: Parse Existing Server Names
      set_fact:

        existing_server_name_list: >-
          {{
            []
            if (
              existing_server_names is not defined
              or existing_server_names | trim == ''
            )
            else
            (
              existing_server_names.split(',')
              | map('trim')
              | reject('equalto', '')
              | list
            )
          }}

    #################################################################
    # Parse New Server IPs
    #################################################################

    - name: Parse New Server IPs
      set_fact:

        new_server_ip_list: >-
          {{
            []
            if (
              real_server_ips is not defined
              or real_server_ips | trim == ''
            )
            else
            (
              real_server_ips.split(',')
              | map('trim')
              | reject('equalto', '')
              | list
            )
          }}

    #################################################################
    # Debug Inputs
    #################################################################

    - name: Debug Survey Inputs
      debug:
        msg:
          - "server_mode              : {{ server_mode }}"
          - "group_mode               : {{ group_mode }}"
          - "existing_server_names    : {{ existing_server_name_list }}"
          - "new_server_ip_list       : {{ new_server_ip_list }}"

    #################################################################
    # Validate Existing Mode
    #################################################################

    - name: Validate Existing Server Mode
      assert:
        that:
          - existing_server_name_list | length > 0
        fail_msg: >
          existing_server_names must be provided
          when server_mode is Existing

      when:
        - server_mode | lower == 'existing'

    #################################################################
    # Validate New Mode
    #################################################################

    - name: Validate New Server Mode
      assert:
        that:
          - new_server_ip_list | length > 0
        fail_msg: >
          real_server_ips must be provided
          when server_mode is New

      when:
        - server_mode | lower == 'new'

    #################################################################
    # Calculate Starting Index
    #################################################################

    - name: Calculate Starting Index
      set_fact:

        rs_start_index: >-
          {{
            (
              existing_server_name_list
              | map('regex_replace', '^rs', '')
              | select('match', '^\d+$')
              | map('int')
              | list
              | max
              if existing_server_name_list | length > 0
              else 0
            ) + 1
          }}

    #################################################################
    # Create New Real Servers
    #################################################################

    - name: Create New Real Servers

      radware.radware_modules.alteon_config_server:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443
          ssh_port: 22
          timeout: 5

        state: present

        parameters:
          index: "rs{{ rs_start_index | int + ansible_loop.index0 }}"
          state: enabled
          ip_address: "{{ item }}"
          weight: 7
          availability: 5

          server_ports:
            - 80
            - 8080
            - 8081

      loop: "{{ new_server_ip_list }}"

      loop_control:
        extended: true

      when:
        - server_mode | lower == 'new'

    #################################################################
    # Build Newly Created Server Names
    #################################################################

    - name: Build New Server Names
      set_fact:

        new_server_names: >-
          {{
            range(
              rs_start_index | int,
              rs_start_index | int + new_server_ip_list | length
            )
            | map('string')
            | map('regex_replace', '^(.*)$', 'rs\1')
            | list
          }}

      when:
        - server_mode | lower == 'new'

    #################################################################
    # Existing Server Mode
    #################################################################

    - name: Use Existing Server Names
      set_fact:
        new_server_names: "{{ existing_server_name_list }}"

      when:
        - server_mode | lower == 'existing'

    #################################################################
    # Build Final Server List
    #################################################################

    - name: Build Final Server List
      set_fact:
        final_server_names: "{{ new_server_names }}"

    #################################################################
    # Debug Final Server List
    #################################################################

    - name: Debug Final Server List
      debug:
        msg:
          - "final_server_names : {{ final_server_names }}"

    #################################################################
    # Fetch Existing Group Info
    #################################################################

    - name: Fetch Existing Group Info

      radware.radware_modules.alteon_config_server_group:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443
          ssh_port: 22
          timeout: 5

        state: gather_facts

        parameters:
          index: "{{ server_group_name }}"

      register: existing_group_info

      ignore_errors: true

      when:
        - group_mode | lower == 'existing'

    #################################################################
    # Merge Existing Group Members
    #################################################################

    - name: Merge Existing Group Members
      set_fact:

        final_server_names: >-
          {{
            (
              (
                existing_group_info.ansible_facts.server_names
                | default([])
              )
              + final_server_names
            ) | unique | list
          }}

      when:
        - group_mode | lower == 'existing'
        - existing_group_info is not failed

    #################################################################
    # Create Empty Server Group
    #################################################################

    - name: Create Empty Server Group

      radware.radware_modules.alteon_config_server_group:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443
          ssh_port: 22
          timeout: 5

        state: present

        parameters:
          index: "{{ server_group_name }}"
          slb_metric: "{{ slb_metric }}"
          persist_overload_max_conn_server: enabled

    #################################################################
    # Apply Empty Group
    #################################################################

    - name: Apply Empty Group

      radware.radware_modules.alteon_mng_config:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443

        command: apply

    #################################################################
    # Attach Servers To Group
    #################################################################

    - name: Attach Servers To Group

      radware.radware_modules.alteon_config_server_group:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443
          ssh_port: 22
          timeout: 5

        state: present

        parameters:
          index: "{{ server_group_name }}"
          slb_metric: "{{ slb_metric }}"
          persist_overload_max_conn_server: enabled
          server_names: "{{ final_server_names }}"

    #################################################################
    # Apply Configuration
    #################################################################

    - name: Apply Alteon Configuration

      radware.radware_modules.alteon_mng_config:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443

        command: apply

    #################################################################
    # Save Configuration
    #################################################################

    - name: Save Alteon Configuration

      radware.radware_modules.alteon_mng_config:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443

        command: save

    #################################################################
    # Final Result
    #################################################################

    - name: Final Result
      debug:
        msg:
          - "Server Mode          : {{ server_mode }}"
          - "Group Mode           : {{ group_mode }}"
          - "Server Group         : {{ server_group_name }}"
          - "SLB Metric           : {{ slb_metric }}"
          - "Final Servers        : {{ final_server_names }}"
