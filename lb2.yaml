---
- name: Configure Alteon Dynamic Real Servers and Server Group
  hosts: localhost
  gather_facts: false

  tasks:

    #################################################################
    # Parse Survey Inputs
    #################################################################

    - name: Parse survey inputs into clean lists
      set_fact:

        new_server_ip_list: >-
          {{
            real_server_ips.split(',')
            | map('trim')
            | reject('equalto', '')
            | list
            if real_server_ips is defined
            else []
          }}

        existing_server_name_list: >-
          {{
            existing_server_names.split(',')
            | map('trim')
            | reject('equalto', '')
            | list
            if existing_server_names is defined
            else []
          }}

    #################################################################
    # Debug Parsed Lists
    #################################################################

    - name: Debug parsed lists
      debug:
        msg:
          - "new_server_ip_list        : {{ new_server_ip_list }}"
          - "existing_server_name_list : {{ existing_server_name_list }}"
          - "group_mode                : {{ group_mode }}"

    #################################################################
    # Validate Input
    #################################################################

    - name: Validate inputs
      assert:
        that:
          - (new_server_ip_list | length > 0) or (existing_server_name_list | length > 0)
        fail_msg: >
          You must provide at least one value in:
          real_server_ips OR existing_server_names

    #################################################################
    # Calculate Starting Index
    #################################################################

    - name: Calculate starting index for new servers
      set_fact:

        rs_start_index: >-
          {{
            (
              existing_server_name_list
              | map('regex_replace', '^rs', '')
              | select('match', '^\d+$')
              | map('int')
              | list
              | max
              if existing_server_name_list | length > 0
              else 0
            ) + 1
          }}

    #################################################################
    # Create Real Servers
    #################################################################

    - name: Create Real Servers

      radware.radware_modules.alteon_config_server:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443
          ssh_port: 22
          timeout: 5

        state: present

        parameters:
          index: "rs{{ rs_start_index | int + ansible_loop.index0 }}"
          state: enabled
          ip_address: "{{ item }}"
          weight: 7
          availability: 5

          server_ports:
            - 80
            - 8080
            - 8081

      loop: "{{ new_server_ip_list }}"

      loop_control:
        extended: true

      when:
        - item | trim != ''

    #################################################################
    # Build Newly Created Server Names
    #################################################################

    - name: Build New Server Name List
      set_fact:

        new_server_names: >-
          {{
            range(
              rs_start_index | int,
              rs_start_index | int + new_server_ip_list | length
            )
            | map('string')
            | map('regex_replace', '^(.*)$', 'rs\1')
            | list
          }}

      when:
        - new_server_ip_list | length > 0

    #################################################################
    # Default Empty New Server List
    #################################################################

    - name: Default New Server Name List to empty
      set_fact:
        new_server_names: []

      when:
        - new_server_ip_list | length == 0

    #################################################################
    # Merge Existing + New Server Names
    #################################################################

    - name: Build Final Combined Server List
      set_fact:
        final_server_names: "{{ existing_server_name_list + new_server_names }}"

    #################################################################
    # Debug Final Server List
    #################################################################

    - name: Debug final server list
      debug:
        msg:
          - "final_server_names : {{ final_server_names }}"

    #################################################################
    # Fetch Existing Group Information
    #################################################################

    - name: Fetch Existing Group Configuration

      radware.radware_modules.alteon_config_server_group:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443
          ssh_port: 22
          timeout: 5

        state: gather_facts

        parameters:
          index: "{{ server_group_name }}"

      register: existing_group_info

      ignore_errors: true

      when:
        - group_mode | lower == 'existing'

    #################################################################
    # Merge Existing Group Members
    #################################################################

    - name: Merge Existing Group Members into Final List
      set_fact:

        final_server_names: >-
          {{
            (
              (
                existing_group_info.ansible_facts.server_names
                | default([])
              )
              + final_server_names
            ) | unique | list
          }}

      when:
        - group_mode | lower == 'existing'
        - existing_group_info is not failed

    #################################################################
    # Create Empty Server Group First
    #################################################################

    - name: Create Empty Server Group

      radware.radware_modules.alteon_config_server_group:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443
          ssh_port: 22
          timeout: 5

        state: present

        parameters:
          index: "{{ server_group_name }}"
          slb_metric: "{{ slb_metric }}"
          persist_overload_max_conn_server: enabled

    #################################################################
    # Apply Empty Group
    #################################################################

    - name: Apply Empty Group

      radware.radware_modules.alteon_mng_config:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443

        command: apply

    #################################################################
    # Attach Servers to Group
    #################################################################

    - name: Attach Servers to Group

      radware.radware_modules.alteon_config_server_group:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443
          ssh_port: 22
          timeout: 5

        state: present

        parameters:
          index: "{{ server_group_name }}"
          slb_metric: "{{ slb_metric }}"
          persist_overload_max_conn_server: enabled
          server_names: "{{ final_server_names }}"

    #################################################################
    # Apply Alteon Configuration
    #################################################################

    - name: Apply Alteon Configuration

      radware.radware_modules.alteon_mng_config:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443

        command: apply

    #################################################################
    # Save Alteon Configuration
    #################################################################

    - name: Save Alteon Configuration

      radware.radware_modules.alteon_mng_config:

        provider:
          server: "{{ management_ip }}"
          user: "{{ alteon_username }}"
          password: "{{ alteon_password }}"
          validate_certs: false
          https_port: 443

        command: save

    #################################################################
    # Final Output
    #################################################################

    - name: Display Final Result

      debug:
        msg:
          - "Group Mode             : {{ group_mode }}"
          - "Server Group           : {{ server_group_name }}"
          - "SLB Metric             : {{ slb_metric }}"
          - "Existing Servers Added : {{ existing_server_name_list }}"
          - "New Servers Created    : {{ new_server_names }}"
          - "Final Group Members    : {{ final_server_names }}"
